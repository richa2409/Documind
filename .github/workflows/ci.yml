name: DocuMind CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Loader Test
        run: |
          python test_loader.py

      - name: Run Chunker Test
        run: |
          python test_chunker.py

      - name: Run Embedder Test
        run: |
          python test_embedder.py

      - name: Run Retriever Test
        run: |
          python test_retriever.py

      - name: Run RAG Test
        run: |
          python test_rag.py